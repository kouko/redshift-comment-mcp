name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests
      # 對 redshift_tools.py（含 SQL validator）做覆蓋率 gate。
      # 目前實測 ~90%，門檻設 85% 留 5pp 緩衝給日常變動，
      # 同時擋住「靜默刪除 validator branch 也沒人發現」這類退化。
      # 其他模組（server / setup_cli / _version）不在 gate 範圍。
      run: |
        pytest tests/ -v --tb=short \
          --cov=redshift_comment_mcp.redshift_tools \
          --cov-report=term-missing \
          --cov-fail-under=85

    - name: Run linting (if available)
      run: |
        # 如果有 linting 工具可以在這裡加入
        echo "Linting skipped - add tools like ruff, black, etc. if needed"
      continue-on-error: true